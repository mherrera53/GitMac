name: Block AI Content

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["**"]

jobs:
    check-for-forbidden-content:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
              with:
                  fetch-depth: 0

            - name: Check Commit Authors and Messages
              run: |
                  echo "Checking for prohibited terms in commit data..."
                  RANGE="HEAD~1..HEAD"
                  if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                    RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
                  fi

                  # Check for Claude/Anthropic watermarks in commit body
                  if git log "$RANGE" --format="%b" | grep -iE "Co-Authored-By:.*Claude|noreply@anthropic|anthropic\.com"; then
                    echo "::error::Found Claude/Anthropic watermark in commit body!"
                    exit 1
                  fi

                  # Check author name and email
                  if git log "$RANGE" --format="%an %ae" | grep -iE "Claude|anthropic"; then
                     echo "::error::Found Claude/Anthropic author!"
                     exit 1
                  fi

                  # Check committer too
                  if git log "$RANGE" --format="%cn %ce" | grep -iE "Claude|anthropic"; then
                     echo "::error::Found Claude/Anthropic committer!"
                     exit 1
                  fi

            - name: Check File Content
              run: |
                  # Grep for "Claude" with standard exclude flags.
                  # -r: recursive
                  # -I: ignore binary files
                  # -i: case insensitive
                  if grep -rI "Claude" . --exclude-dir=.git --exclude="block-ai.yml" --exclude=".mailmap"; then
                     echo "::error::Found prohibited content in files!"
                     exit 1
                  fi
