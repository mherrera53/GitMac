# Build and test GitMac
name: Build

permissions:
  contents: read

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        run: xcodebuild -scheme GitMac -destination 'platform=macOS' build

      - name: Run tests
        run: xcodebuild -scheme GitMac -destination 'platform=macOS' test
